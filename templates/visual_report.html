<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regressionary // Visual Topology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white !important; color: black !important; }
            .report-card { border: 1px solid #000 !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 sm:p-10 font-serif">

    <div class="max-w-4xl mx-auto bg-white p-8 shadow-xl border-t-8 border-black report-card relative">
        <!-- Header -->
        <div class="flex justify-between items-start border-b-2 border-black pb-6 mb-8">
            <div>
                <h1 class="font-['DotGothic16'] text-4xl uppercase tracking-tighter">Visual Topology</h1>
                <p class="text-xs font-mono text-gray-500">REF ID: {{ session['username'] | upper }}-{{ range(1000, 9999) | random }}</p>
            </div>
            <div class="text-right font-mono text-sm sm:text-base leading-snug">
                <p class="font-['DotGothic16'] text-black">REGRESSIONARY SYSTEM V1.0</p>
            </div>
        </div>

        <!-- The Graph -->
        <section>
            <h2 class="font-['DotGothic16'] text-lg uppercase tracking-widest text-gray-400 mb-3 border-b border-gray-100 pb-1">Bivariate Analysis: {{ results.y }} vs {{ results.x }}</h2>
            <div class="border border-black p-2 mt-4">
                <img src="data:image/png;base64,{{ results.graph_img }}" class="w-full h-auto" alt="Model Fit Graph">
            </div>
        </section>
    </div>

    <!-- Floating Action Button -->
    <div class="fixed bottom-8 right-8 flex space-x-2 no-print">
        <button onclick="window.print()" class="bg-black text-white px-6 py-3 rounded-full font-bold shadow-2xl hover:bg-red-600 transition-colors uppercase text-xs tracking-widest">
            Print / Save PDF
        </button>
        <a href="/visual" class="bg-gray-200 text-black px-6 py-3 rounded-full font-bold text-xs hover:bg-gray-300 transition-colors uppercase">
            Exit
        </a>
    </div>
</body>
</html>
